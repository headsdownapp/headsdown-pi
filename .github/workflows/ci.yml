name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # The SDK is a git dependency. npm lockfile resolves to ssh://
      # but CI doesn't have SSH keys. Rewrite to HTTPS.
      - run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run lint
